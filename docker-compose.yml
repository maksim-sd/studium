services:
  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend_studium
    depends_on:
      - backend
    volumes:
      - media:/usr/share/nginx/media:ro
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  media:
